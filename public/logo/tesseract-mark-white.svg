<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512" role="img">
  <title>Tesseract</title>
  <desc>Tesseract brand mark — Dimensional Craftsman (white / dark background)</desc>

  <!-- Outer hexagon: variable weight edges — thick top, medium sides, thin bottom -->
  <path d="M 94.8 21 Q 100 18, 105.2 21 L 165.8 56" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 29 65 Q 29 59, 34.2 56 L 94.8 21" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 165.8 56 Q 171 59, 171 65 L 171 135" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <path d="M 34.2 144 Q 29 141, 29 135 L 29 65" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <path d="M 171 135 Q 171 141, 165.8 144 L 105.2 179" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <path d="M 105.2 179 Q 100 182, 94.8 179 L 34.2 144" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Y-core: bold lines from center to primary vertices -->
  <line x1="100" y1="100" x2="100" y2="18" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="171" y2="141" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="29" y2="141" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ghost dimension lines: thin traces toward hidden vertices (75%) -->
  <line x1="100" y1="100" x2="153" y2="69" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="100" y2="162" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="47" y2="69" stroke="#fff" stroke-width="1" stroke-linecap="round"/>

  <!-- Precision ticks: craftsman signature at Y-arm midpoints -->
  <line x1="96" y1="59" x2="104" y2="59" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="133.5" y1="124" x2="137.5" y2="117" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="62.5" y1="117" x2="66.5" y2="124" stroke="#fff" stroke-width="1" stroke-linecap="round"/>

  <!-- Vertex nodes: size hierarchy — center, primary, ghost -->
  <circle cx="100" cy="100" r="3" fill="#fff"/>
  <circle cx="100" cy="18" r="2.5" fill="#fff"/>
  <circle cx="171" cy="141" r="1.8" fill="#fff"/>
  <circle cx="29" cy="141" r="1.8" fill="#fff"/>
  <circle cx="153" cy="69" r="1.2" fill="#fff"/>
  <circle cx="100" cy="162" r="1.2" fill="#fff"/>
  <circle cx="47" cy="69" r="1.2" fill="#fff"/>
</svg>
